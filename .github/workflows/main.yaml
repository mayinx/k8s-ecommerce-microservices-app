# .github/workflows/main.yaml
#
# Legacy Upstream CI Workflow (Archived)
#
# Purpose:
#   Retained strictly for historical reference. This workflow is no longer part
#   of the active project CI/CD path.
#
# Status:
#   Manual only. Automatic push / tag execution was intentionally removed to
#   prevent legacy upstream CI runs from adding failure noise to the active
#   project workflows.
#
# Rationale:
# - Architecture Mismatch: Reflects the inherited upstream CI model rather than 
#   the custom Proxmox/K3s target delivery path built for this project.
# - Obsolete Targets: Tests legacy complete-demo and local KinD assumptions.
# - Stale Registry Auth: Attempts an old Docker Hub publish path requiring 
#   upstream-specific secrets, whereas this project utilizes GHCR.

# - Architecture mismatch: reflects the inherited upstream CI model rather than
#   the repo-specific Proxmox / K3s delivery path used in this project.
# - Obsolete targets: Validates legacy complete-demo and local Kind assumptions.
# - Docekr Hub based: includes an old Docker Hub publish flow requiring
#   upstream-specific secrets (DOCKER_USER, DOCKER_PASS) and image tags like 
#   `weaveworksdemos/<image>:<sha>`, while this project uses GHCR.

name: Legacy Upstream CI (Manual Only)

on:
  # Retained solely for manual on-demand execution if historical debugging is needed.
  workflow_dispatch:

  # ---------------------------------------------------------------------------
  # ARCHIVED TRIGGERS
  # ---------------------------------------------------------------------------
  # push:
  #   branches:
  #     - "*"  
  #   tags:
  #     - "*"

jobs:
  #
  #
  #check complete demo is in sync with individual manifest, it should block fom merge. Should this be a diferent file?
  complete-demo-sync-check:
    runs-on: ubuntu-latest
    env:
      COMPLETE_DEMO_ARGS: --rm -v ${{ github.workspace }}:/workdir
      COMPLETE_DEMO_DIR: 'deploy/kubernetes/'
      COMPLETE_DEMO_IMAGE: 'manifests-image'
    steps:
    - uses: actions/checkout@v2

    #
    #
    # Build image
    - name: Build image
      env:
        DOCKER_BUILDKIT: 1
      run: docker build -t $COMPLETE_DEMO_IMAGE $COMPLETE_DEMO_DIR

    #
    #
    # Check that manifest and complete-demo.yaml ahve the same content
    - name: check comeplte-demo.yaml content sync
      run: docker run $COMPLETE_DEMO_ARGS $COMPLETE_DEMO_IMAGE make -C $COMPLETE_DEMO_DIR check-complete-demo

  #
  #
  #check that we can deploy complete-demo
  #NOTE: what about docker compose? maybe doesn't make sense if we use the KIND action
  #NOTE: later we can test that the documentation is tested, as in previous cronjobs in travis
  deployments-tests:
    needs: complete-demo-sync-check
    runs-on: ubuntu-latest
    env:
      kind-version: 'v0.10.0'
      kind-image: 'kindest/node:v1.20.0'
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v2
    - name: Start KinD
      uses: engineerd/setup-kind@v0.5.0
      with:
        version: ${{ env.kind-version }}
        image: ${{ env.kind-image }}
    - name: Wait cluster to start
      run: |
        until [ "$(kubectl get pods -A --no-headers | grep -cEv '([0-9]+)/\1')" -eq 0 ]; do
            sleep 5s
        done
        kubectl get pod -A
    - name: Run and test Complete demo
      run: |
        kubectl apply -f deploy/kubernetes/complete-demo.yaml
        until [ "$(kubectl get pods -n sock-shop --no-headers | grep -cEv '([0-9]+)/\1')" -eq 0 ]; do
            sleep 5s
            kubectl get pods -n sock-shop
            kubectl describe node | grep "Allocated resources" -A 10
        done
        kubectl get pod -A

  #
  #
  #build openapi and healtcheck images
  build-test-images:
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    env:
      GROUP: weaveworksdemos 
    strategy:
      matrix:
        repo: ["openapi", "healthcheck"]
    steps:
    - uses: actions/checkout@v2

    #
    #
    # Push to dockerhub
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    
    - name: Login to DockerHub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASS }}

    - name: Build and push
      uses: docker/build-push-action@v2
      with:
        context: ${{ matrix.repo }}
        push: true
        tags: ${{ env.GROUP }}/${{ matrix.repo }}:${{ github.sha }}
