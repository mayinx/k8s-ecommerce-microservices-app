# Kustomize base entrypoint for the proven raw Sock Shop manifest set
# Purpose:
# - package the already proven raw manifests as one reusable Kustomize base for the 
#   dev/prod overlays located in deploy/kubernetes/kustomize/overlays/dev|prod/kustomization.yml 
# - let the dev/prod overlays reuse that base instead of duplicating the whole manifest set
#
# Why this file exists:
# - Kustomize overlays need a base resource set/inventory to customize
# - this file tells Kustomize which existing manifest files belong to that base
#
# References:
# - Kubernetes Kustomize docs (bases/resources)
# - see project-docs/03-ci-cd-baseline/IMPLEMENTATION.md for rationale and source links

# Kustomize configuration schema version
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base resource set reused by the environment overlays (dev / prod)
resources:
  - 01-carts-dep.yaml
  - 02-carts-svc.yml
  - 03-carts-db-dep.yaml
  - 04-carts-db-svc.yaml
  - 05-catalogue-dep.yaml
  - 06-catalogue-svc.yaml
  - 07-catalogue-db-dep.yaml
  - 08-catalogue-db-svc.yaml
  - 09-front-end-dep.yaml
  - 10-front-end-svc.yaml
  - 11-orders-dep.yaml
  - 12-orders-svc.yaml
  - 13-orders-db-dep.yaml
  - 14-orders-db-svc.yaml
  - 15-payment-dep.yaml
  - 16-payment-svc.yaml
  - 17-queue-master-dep.yaml
  - 18-queue-master-svc.yaml
  - 19-rabbitmq-dep.yaml
  - 20-rabbitmq-svc.yaml
  - 21-session-db-dep.yaml
  - 22-session-db-svc.yaml
  - 23-shipping-dep.yaml
  - 24-shipping-svc.yaml
  - 25-user-dep.yaml
  - 26-user-svc.yaml
  - 27-user-db-dep.yaml
  - 28-user-db-svc.yaml